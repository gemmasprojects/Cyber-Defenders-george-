<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cyber Defenders</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">

        <h1>🛡️ Cyber Defenders</h1>

        <div class="george-box">
            <img src="george.png" alt="George the Dragon" class="george-img">
            <p id="georgeText">
                Hello Defender! I’m George, your friendly cyber‑security guide.
                Let’s learn how to stay safe online — no experience needed!
            </p>
        </div>

        <button id="startBtn">Start Game</button>

        <p id="question" class="hidden"></p>
        <div id="answers"></div>

        <p id="feedback"></p>
        <button id="nextBtn" class="hidden">Next</button>

        <div id="score" class="hidden"></div>
    </div>

    <script src="game.js"></script>
</body>
</html>
